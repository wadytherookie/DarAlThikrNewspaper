<!doctype html>
<html lang="en">
<head>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 50px; }
        .admin-card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #2ecc71; }
        input, textarea { width: 100%; margin-bottom: 10px; background: #333; color: white; border: 1px solid #444; padding: 10px; }
        button { background: #2ecc71; color: black; font-weight: bold; width: 100%; padding: 20px; border: none; cursor: pointer; }
        #auth-gate { text-align: center; margin-top: 100px; }
    </style>
   
    <link rel="icon" type="image/png" href="logo-removebg-preview.png">

</head>
<body>
    

<div id="auth-gate">
    <h2>🔒 Control Center Locked</h2>
    <input type="password" id="pass" placeholder="Enter Admin Password" style="width: 300px; text-align: center;">
    <br>
    <button onclick="checkPass()" style="width: 300px;">Login</button>
</div>

<div id="main-content" style="display:none;">
    <h1>Newspaper Editor</h1>
    <label>Ticker Text</label>
    <input type="text" id="ticker_text">
    
    <div id="articles-inputs"></div>
    <button onclick="publishUpdate()">PUBLISH ALL CHANGES</button>
</div>

<script>
    function checkPass() {
        if(document.getElementById('pass').value === "DarAlThikr2026") {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            fetchCurrentData();
        } else { alert("Wrong Password"); }
    }

    // Generate 6 article slots
    const container = document.getElementById('articles-inputs');
    for (let i = 0; i < 6; i++) {
        container.innerHTML += `
            <div class="admin-card">
                <h3>Article #${i + 1}</h3>
                <input type="text" class="art-cat" placeholder="Category">
                <input type="text" class="art-title" placeholder="Title">
                <input type="text" class="art-desc" placeholder="Brief Summary">
                <textarea class="art-content" placeholder="Full Content"></textarea>
                <input type="text" class="art-img" placeholder="Main Image URL">
                <input type="text" class="art-sub-1" placeholder="Sub-Image 1 URL">
                <input type="text" class="art-sub-2" placeholder="Sub-Image 2 URL">
                <input type="text" class="art-sub-3" placeholder="Sub-Image 3 URL">
                <input type="text" class="art-sub-4" placeholder="Sub-Image 4 URL">
            </div>`;
    }

    async function fetchCurrentData() {
        try {
            const res = await fetch('https://daralthikrnewspaper.onrender.com/status');
            const data = await res.json();
            document.getElementById('ticker_text').value = data.ticker_text || "";
            
            data.articles.forEach((art, i) => {
                if(i < 6) {
                    document.querySelectorAll('.art-cat')[i].value = art.category || "";
                    document.querySelectorAll('.art-title')[i].value = art.title || "";
                    document.querySelectorAll('.art-desc')[i].value = art.description || "";
                    document.querySelectorAll('.art-content')[i].value = art.content || "";
                    document.querySelectorAll('.art-img')[i].value = art.image_url || "";
                    document.querySelectorAll('.art-sub-1')[i].value = art.sub_image_1 || "";
                    document.querySelectorAll('.art-sub-2')[i].value = art.sub_image_2 || "";
                    document.querySelectorAll('.art-sub-3')[i].value = art.sub_image_3 || "";
                    document.querySelectorAll('.art-sub-4')[i].value = art.sub_image_4 || "";
                }
            });
        } catch (e) { console.error("Could not fetch:", e); }
    }

    async function publishUpdate() {
        const list = [];
        for (let i = 0; i < 6; i++) {
            list.push({
                category: document.querySelectorAll('.art-cat')[i].value,
                title: document.querySelectorAll('.art-title')[i].value,
                description: document.querySelectorAll('.art-desc')[i].value,
                content: document.querySelectorAll('.art-content')[i].value,
                image_url: document.querySelectorAll('.art-img')[i].value,
                sub_image_1: document.querySelectorAll('.art-sub-1')[i].value,
                sub_image_2: document.querySelectorAll('.art-sub-2')[i].value,
                sub_image_3: document.querySelectorAll('.art-sub-3')[i].value,
                sub_image_4: document.querySelectorAll('.art-sub-4')[i].value
            });
        }

        try {
            const res = await fetch('https://daralthikrnewspaper.onrender.com/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': 'DarAlThikr_Secret_2026' },
                body: JSON.stringify({
                    ticker_text: document.getElementById('ticker_text').value,
                    articles: list
                })
            });
            if(res.ok) alert("Live!"); else alert("Update failed.");
        } catch (error) { alert("Error sending update."); }
    }
</script>
</body>
</html>
