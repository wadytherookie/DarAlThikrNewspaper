<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f1ea; /* Traditional Newsprint Beige */
            color: #1a1a1a;
            font-family: 'Source Serif Pro', serif;
        }

        .header-section {
            border-bottom: 4px double #333;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: center;
        }

        .school-logo {
            max-width: 120px;
            margin-bottom: 15px;
            filter: grayscale(100%); /* Keeps it looking classic */
        }

        .newspaper-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
        }

        /* Odd Articles: Traditional Bordered Look */
        .article-odd {
            background: #fff;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 5px 5px 0px #ddd;
        }

        /* Even Articles: Minimalist Clean Look */
        .article-even {
            background: transparent;
            padding: 20px;
            border-left: 5px solid #333;
        }

        .featured-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: sepia(0.2);
            margin-bottom: 15px;
        }

        .category-tag {
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
            color: #7f8c8d;
            border-bottom: 1px solid #7f8c8d;
        }

        .btn-read {
            background: #333;
            color: white;
            border: none;
            padding: 5px 15px;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header class="header-section">
    <div class="container">
        <img src="logo.jpg" class="school-logo" alt="Logo">
        <h1 class="newspaper-title">The Al-Thikr Times</h1>
        <p>Jeddah, Saudi Arabia • <span id="current-date"></span></p>
    </div>
</header>

<div class="container">
    <div class="row" id="main-news-container"></div>
</div>

<div class="modal fade" id="articleModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content" style="background: #f4f1ea; border-radius: 0;">
      <div class="modal-header">
        <h5 class="modal-title" id="m-title" style="font-family: 'Playfair Display'; font-weight: bold;"></h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <img id="m-img" src="" class="img-fluid mb-3">
        <p id="m-content" style="font-size: 1.2rem; line-height: 1.6;"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

    async function syncNewspaper() {
        try {
            const response = await fetch('https://daralthikrnewspaper.onrender.com/status');
            const data = await response.json();
            const mainRow = document.getElementById('main-news-container');
            mainRow.innerHTML = ''; 

            data.articles.forEach((article, index) => {
                const isOdd = (index + 1) % 2 !== 0;
                const designClass = isOdd ? 'article-odd' : 'article-even';
                
                const articleHTML = `
                    <div class="col-md-4 mb-5">
                        <div class="${designClass}">
                            <img src="${article.image_url}" class="featured-image">
                            <span class="category-tag">${article.category}</span>
                            <h3 class="mt-2">${article.title}</h3>
                            <p>${article.description}</p>
                            <button class="btn-read" onclick="showSub('${article.title}', '${article.image_url}', \`${article.content}\`)">Read Sub-Article →</button>
                        </div>
                    </div>
                `;
                mainRow.insertAdjacentHTML('beforeend', articleHTML);
            });
        } catch (e) { console.log("Offline"); }
    }

    function showSub(title, img, content) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-img').src = img;
        document.getElementById('m-content').innerText = content;
        $('#articleModal').modal('show');
    }

    syncNewspaper();
</script>
</body>
</html>
