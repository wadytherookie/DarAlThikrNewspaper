<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #f4f1ea; color: #1a1a1a; font-family: 'Cairo', sans-serif; }
        .header-section { border-bottom: 4px double #333; padding: 20px 0; margin-bottom: 30px; text-align: center; }
        .school-logo { max-width: 120px; margin-bottom: 15px; filter: grayscale(100%); }
        .newspaper-title { font-size: 3.5rem; font-weight: 900; margin: 0; }
        .article-odd { background: #fff; padding: 20px; border: 1px solid #ccc; box-shadow: -5px 5px 0px #ddd; margin-bottom: 20px; }
        .featured-image { width: 100%; height: 200px; object-fit: cover; filter: sepia(0.2); margin-bottom: 15px; }
        .btn-read { background: #333; color: white; border: none; padding: 8px 20px; cursor: pointer; }
        
        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>

<body>

<header class="header-section">
    <div style="background: #333; color: white; padding: 10px; overflow: hidden; margin-bottom: 20px; white-space: nowrap; position: relative;">
        <div id="ticker-text" style="display: inline-block; animation: scroll-left 15s linear infinite;">جاري التحميل...</div>
    </div>
    <div class="container">
        <img src="logo-removebg-preview.png" class="school-logo" alt="Logo">
        <h1 class="newspaper-title">صحيفة دار الذكر الثانوية</h1>
        <p>جدة، المملكة العربية السعودية • <span id="current-date"></span></p>
    </div>
</header>

<div class="container"><div class="row" id="main-news-container"></div></div>

<div class="modal fade" id="articleModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background: #f4f1ea;">
      <div class="modal-header"><h5 id="m-title" style="font-weight: bold;"></h5></div>
      <div class="modal-body" style="display: flex; flex-direction: column; align-items: center;">
        <img id="m-img" class="img-fluid" style="margin-bottom: 10px; height: 300px; object-fit: cover;">
        <div style="margin-bottom: 20px;">
            <button class="btn btn-secondary" onclick="changeSlide(-1)">← Prev</button>
            <button class="btn btn-secondary" onclick="changeSlide(1)">Next →</button>
        </div>
        <p id="m-content" style="width: 100%; text-align: justify;"></p>
      </div>
    </div>
  </div>
</div>

<footer style="text-align: center; padding: 40px; background: #0d0d0d; color: #f5f3f5; margin-top: 50px;">
    <p>&copy; 2026 Al-Thikr Times All Rights Reserved</p>
    <p>Designed and Developed by Mohamed Mostafa Al-Sharif</p>
</footer>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-GB', { 
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
    });

    let currentImgIndex = 0;
    let modalImages = [];

    async function syncNewspaper() {
        try {
            const response = await fetch('https://daralthikrnewspaper.onrender.com/status?t=' + new Date().getTime());
            const data = await response.json();
            document.getElementById('ticker-text').innerText = data.ticker_text;
            const mainRow = document.getElementById('main-news-container');
            mainRow.innerHTML = ''; 
            data.articles.forEach((art) => {
                mainRow.insertAdjacentHTML('beforeend', `
                    <div class="col-md-4">
                        <div class="article-odd">
                            <img src="${art.image_url}" class="featured-image">
                            <h3>${art.title}</h3>
                            <p>${art.description}</p>
                            <button class="btn-read" onclick="showSub('${art.title}', '${art.image_url}', '${art.sub_image_url}', \`${art.content}\`)">اقرأ المزيد ←</button>
                        </div>
                    </div>`);
            });
        } catch (e) { console.log("Offline"); }
    }

    function showSub(title, img, subImg, content) {
        modalImages = [img, subImg];
        currentImgIndex = 0;
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-img').src = modalImages[currentImgIndex];
        document.getElementById('m-content').innerText = content;
        $('#articleModal').modal('show');
    }

    function changeSlide(dir) {
        currentImgIndex = (currentImgIndex + dir + modalImages.length) % modalImages.length;
        document.getElementById('m-img').src = modalImages[currentImgIndex];
    }

    syncNewspaper();
</script>
</body>
</html>
