<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --dak-green: #2ecc71; --dak-dark: #0a2e1f; }
        body { background-color: #050f0a; font-family: 'Inter', sans-serif; color: #e0e0e0; padding-top: 50px; }
        .admin-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; margin-bottom: 20px; }
        .form-control { background: #0a2e1f; border: 1px solid #2ecc71; color: white; }
        .form-control:focus { background: #0d3d29; color: white; border-color: #2ecc71; box-shadow: none; }
        label { font-weight: 700; color: var(--dak-green); text-transform: uppercase; font-size: 0.8rem; }
        .btn-publish { background: var(--dak-green); color: #0a2e1f; font-weight: 900; width: 100%; padding: 15px; border-radius: 10px; border: none; transition: 0.3s; }
        .btn-publish:hover { background: #27ae60; transform: scale(1.02); cursor: pointer; }
        .article-entry { border-left: 3px solid var(--dak-green); padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

<div class="container pb-5">
    <h2 class="mb-4">North.ai <span style="color: var(--dak-green)">Control Center</span></h2>
    <hr style="border-color: rgba(255,255,255,0.1)">

    <div class="admin-card">
        <label>Global Ticker Text</label>
        <input type="text" id="ticker_text" class="form-control" placeholder="Enter breaking news for the ticker...">
    </div>

    <div class="admin-card">
        <h5 class="mb-4 text-white">News List (6 Articles)</h5>
        <div id="articles-container">
            </div>
    </div>

    <button class="btn-publish" onclick="publishUpdate()">PUBLISH TO NEWSPAPER</button>
    <p class="text-center mt-3 small text-muted">Token: DarAlThikr_Secret_2026</p>
</div>

<script>
    // 1. Generate 6 slots for articles
    const container = document.getElementById('articles-container');
    for (let i = 1; i <= 6; i++) {
        container.innerHTML += `
            <div class="article-entry">
                <label>Article #${i} ${i === 1 ? '(Main Featured Story)' : ''}</label>
                <div class="row mt-2">
                    <div class="col-md-4"><input type="text" class="form-control mb-2 art-category" placeholder="Category"></div>
                    <div class="col-md-8"><input type="text" class="form-control mb-2 art-title" placeholder="Title"></div>
                </div>
                <textarea class="form-control mb-2 art-desc" placeholder="Brief description..."></textarea>
                <input type="text" class="form-control mb-2 art-img" placeholder="Image URL (Direct link to .jpg or .png)">
            </div>`;
    }

    // 2. Publish logic
    async function publishUpdate() {
        const categories = document.querySelectorAll('.art-category');
        const titles = document.querySelectorAll('.art-title');
        const descs = document.querySelectorAll('.art-desc');
        const imgs = document.querySelectorAll('.art-img');
        const articlesList = [];

        // Collect all filled articles
        for (let i = 0; i < titles.length; i++) {
            if (titles[i].value.trim() !== "") {
                articlesList.push({
                    category: categories[i].value || "Update",
                    title: titles[i].value,
                    description: descs[i].value || "",
                    image_url: imgs[i].value || "https://via.placeholder.com/400"
                });
            }
        }

        try {
           // Change the publishUpdate function line to:
const response = await fetch('https://daralthikrnewspaper.onrender.com/update', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'x-admin-token': 'DarAlThikr_Secret_2026' 
                },
                body: JSON.stringify({
                    ticker_text: document.getElementById('ticker_text').value,
                    is_active: false, 
                    articles: articlesList
                })
            });

            if(response.ok) {
                alert(" Newspaper Updated Successfully!");
            } else {
                alert(" Server rejected the update. Check token.");
            }
        } catch (err) { 
            alert(" Connection Error: Is your FastAPI running?"); 
        }
    }
</script>

</body>
</html>
