<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dak-green: #2ecc71;
            --dak-dark: #0a2e1f;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: #050f0a;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- BREAKING NEWS TICKER --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: var(--dak-green);
            color: #050f0a;
            padding: 8px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }
        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker-animation 25s linear infinite;
        }
        @keyframes ticker-animation {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .header-section {
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(to bottom, var(--dak-dark), transparent);
        }

        .newspaper-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: white;
            margin: 10px 0;
        }

        .article-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s;
            height: 100%;
        }

        .article-card:hover {
            transform: translateY(-5px);
            border-color: var(--dak-green);
        }

        .featured-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            background-size: cover;
            background-position: center;
        }

        .category-tag {
            color: var(--dak-green);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-move" id="managed-ticker">Connecting to Control Center...</div>
    </div>

    <header class="header-section">
        <div class="container">
            <span style="letter-spacing: 5px; color: var(--dak-green); font-weight: 700;">DAR AL-THIKR SCHOOLS</span>
            <h1 class="newspaper-title">The Al-Thikr Times</h1>
            <p class="text-muted">Issue No. 14 • April 2026</p>
        </div>
    </header>

    <div class="container pb-5">
        <div class="row" id="main-news-container">
            <div class="col-12 text-center mt-5">
                <p>Syncing with Control Center...</p>
            </div>
        </div>
    </div>

<script>
    async function syncNewspaper() {
        try {
            // Change the syncNewspaper function line to:
const response = await fetch('https://daralthikrnewspaper.onrender.com/status');
            const data = await response.json();

            // 1. Update the Ticker
            document.getElementById('managed-ticker').innerText = data.ticker_text;

            // 2. Clear and Inject Articles
            const mainRow = document.getElementById('main-news-container');
            mainRow.innerHTML = ''; 

            data.articles.forEach((article, index) => {
                // If there's only 1 article, make it wide. Otherwise, tile them.
                const colSize = (index === 0 && data.articles.length === 1) ? 'col-md-12' : 
                               (index === 0) ? 'col-md-8' : 'col-md-4';
                
                const articleHTML = `
                    <div class="${colSize} mb-4">
                        <div class="article-card">
                            <div class="featured-image" style="background-image: url('${article.image_url}')"></div>
                            <span class="category-tag">${article.category}</span>
                            <h2 class="mt-2" style="color: white;">${article.title}</h2>
                            <p style="color: #bdc3c7;">${article.description}</p>
                            <a href="#" class="text-white font-weight-bold">Read Full Story →</a>
                        </div>
                    </div>
                `;
                mainRow.insertAdjacentHTML('beforeend', articleHTML);
            });

        } catch (error) {
            console.error("Backend offline:", error);
            document.getElementById('managed-ticker').innerText = "OFFLINE - CHECK CONTROL CENTER TERMINAL";
        }
    }

    // Call immediately and every 5 seconds
    syncNewspaper();
    setInterval(syncNewspaper, 5000);
</script>
</body>
</html>
